# Mirrors the TypeScript SDK hooks: format + lint + docs-sync on commit, then a
# full lint/typecheck + docs-drift + test gate on push. Go has no single biome-style
# tool, so gofmt is the formatter and `go vet` is the linter (it also type-checks,
# covering what `bun typecheck` does in the TS SDK).
pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files} && git add {staged_files}
      stage_fixed: true
    vet:
      run: go vet ./...
    docs-sync:
      glob: "{specs/openapi.json,tools/roxygen/**/*.go}"
      run: go run ./tools/roxygen sync-docs && git add README.md AGENTS.md docs/llms-full.txt
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    vet:
      run: go vet ./...
      priority: 1
    gofmt-check:
      run: test -z "$(gofmt -l .)" || { echo "unformatted files, run gofmt -w ."; gofmt -l .; exit 1; }
      priority: 2
    docs-drift:
      run: go run ./tools/roxygen sync-docs && git diff --exit-code -- README.md AGENTS.md docs/llms-full.txt || { echo "README.md/AGENTS.md/llms-full.txt drifted from spec, commit the sync output"; exit 1; }
      priority: 3
    test:
      run: go test ./...
      priority: 4
